      security:
      - bearerAuth: []
      responses:
        '204':
          description: Organization deleted.
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIErrorSerializerV1'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIErrorSerializerV1'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIErrorSerializerV1'
          description: ''
components:
  schemas:
    APIErrorBodySerializerV1:
      type: object
      properties:
        code:
          type: string
          readOnly: true
        message:
          type: string
          readOnly: true
        details:
          readOnly: true
          nullable: true
      required:
      - code
      - details
      - message
    APIErrorSerializerV1:
      type: object
      properties:
        error:
          allOf:
          - $ref: '#/components/schemas/APIErrorBodySerializerV1'
          readOnly: true
      required:
      - error
    AccountOutputSerializerV1:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          readOnly: true
          title: Usuário
          description: Obrigatório. 150 caracteres ou menos. Letras, números e @/./+/-/_
            apenas.
        email:
          type: string
          format: email
          readOnly: true
        avatar_type:
          type: string
          readOnly: true
          nullable: true
        is_active:
          type: boolean
          readOnly: true
          title: Ativo
          description: Indica que o usuário será tratado como ativo. Ao invés de excluir
            contas de usuário, desmarque isso.
        date_joined:
          type: string
          format: date-time
          readOnly: true
          title: Data de registro
      required:
      - avatar_type
      - date_joined
      - email
      - id
      - is_active
      - username
    AccountRegistrationInputSerializerV1:
      type: object
      properties:
        username:
          type: string
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          maxLength: 254
        password:
          type: string
          writeOnly: true
          maxLength: 128
        password_confirm:
          type: string
          writeOnly: true
          maxLength: 128
        avatar_type:
          type: string
          nullable: true
          maxLength: 64
      required:
      - email
      - password
      - password_confirm
      - username
    AuthenticationOutputSerializerV1:
      type: object
      description: Serializa os dados de autenticação para a resposta da API.
      properties:
        access_token:
          type: string
