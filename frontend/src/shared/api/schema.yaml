  /api/v1/accounts/:
    post:
      operationId: v1_accounts_create
      description: Register a local user account.
      tags:
      - Accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountRegistrationInputSerializerV1'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AccountRegistrationInputSerializerV1'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AccountRegistrationInputSerializerV1'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountOutputSerializerV1'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIErrorSerializerV1'
          description: ''
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIErrorSerializerV1'
          description: ''
        '429':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIErrorSerializerV1'
          description: ''
  /api/v1/accounts/me/:
    get:
      operationId: v1_accounts_me_retrieve
      description: Retrieve, update or soft-delete the authenticated user's own account.
      tags:
      - Accounts
      security:
      - bearerAuth: []
