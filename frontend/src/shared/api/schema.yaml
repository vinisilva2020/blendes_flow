  /api/v1/authentication/logout/:
    post:
      operationId: v1_authentication_logout_create
      description: Revoga a sessão de autenticação atual do usuário.
      tags:
      - Authentication
      security:
      - bearerAuth: []
      responses:
        '204':
          description: Authentication session revoked.
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIErrorSerializerV1'
          description: ''
  /api/v1/authentication/refresh/:
    post:
      operationId: v1_authentication_refresh_create
      description: Renova os tokens de acesso e refresh usando um token de refresh
