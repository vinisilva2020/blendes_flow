name: blendesflow

services:
  database:
    image: postgres:17-alpine@sha256:979c4379dd698aba0b890599a6104e082035f98ef31d9b9291ec22f2b13059ca
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - data
    healthcheck:
      test:
        ["CMD-SHELL", 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    security_opt:
      - no-new-privileges:true

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: blendesflow-backend:local
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DJANGO_SECRET_KEY_FILE: /run/secrets/django_secret_key
      JWT_SIGNING_KEY_FILE: /run/secrets/jwt_signing_key
      DB_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - django_secret_key
      - jwt_signing_key
      - postgres_password
    expose:
      - "8000"
    volumes:
      - django_static:/var/www/static
      - django_media:/var/www/media
    networks:
      - edge
      - data
    depends_on:
      database:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  nginx:
    build:
      context: .
      dockerfile: infrastructure/nginx/Dockerfile
    image: blendesflow-nginx:local
    restart: unless-stopped
    ports:
      - "80:8080"
    volumes:
      - django_static:/var/www/static:ro
      - django_media:/var/www/media:ro
    networks:
      - edge
    depends_on:
      backend:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777

networks:
  edge:
    driver: bridge
  data:
    driver: bridge
    internal: true

volumes:
  postgres_data:
  django_static:
  django_media:

secrets:
  django_secret_key:
    file: ./infrastructure/secrets/django_secret_key.txt
  jwt_signing_key:
    file: ./infrastructure/secrets/jwt_signing_key.txt
  postgres_password:
    file: ./infrastructure/secrets/postgres_password.txt
