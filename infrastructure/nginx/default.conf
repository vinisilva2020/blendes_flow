upstream django_backend {
    # "backend" deve corresponder ao nome do serviço Django no Compose.
    server backend:8000;
    keepalive 32;
}

server {
    listen 8080;
    listen [::]:8080;

    # Implantação interna somente HTTP. Substitua "_" pelo domínio, se necessário.
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;
    charset utf-8;
    client_max_body_size 20m;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "same-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # Não mantém o ponto de entrada da SPA em cache entre implantações.
    location = /index.html {
        try_files $uri =404;
        expires -1;
    }

    # O Vite gera assets com hash de conteúdo neste diretório.
    location ^~ /assets/ {
        try_files $uri =404;
        expires 1y;
        access_log off;
    }

    location = /api {
        return 308 /api/;
    }

    location ^~ /api/ {
        include /etc/nginx/proxy_params.conf;

        # Sem barra final para preservar a URI original /api/...
        proxy_pass http://django_backend;
    }

    location = /admin {
        return 308 /admin/;
    }

    location ^~ /admin/ {
        include /etc/nginx/proxy_params.conf;
        proxy_pass http://django_backend;
    }

    # Estes caminhos devem corresponder aos volumes montados no container.
    location ^~ /static/ {
        alias /var/www/static/;
        expires 7d;
        access_log off;
        autoindex off;
    }

    location ^~ /media/ {
        alias /var/www/media/;
        expires 1h;
        autoindex off;
    }

    # Fallback do modo history do Vue Router; deve ficar após as rotas do backend.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}